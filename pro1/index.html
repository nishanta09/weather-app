<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <p>Get real-time weather information</p>
        </header>

        <main>
            <div class="search-section">
                <input type="text" id="cityInput" placeholder="Enter city name...">
                <button id="searchBtn">Search</button>
                <button id="locationBtn">Use My Location</button>
            </div>

            <div class="api-selector">
                <label for="apiSelector">Choose API:</label>
                <select id="apiSelector">
                    <option value="weatherstack">WeatherStack</option>
                    <option value="openweather">OpenWeatherMap</option>
                    <option value="weatherapi">WeatherAPI</option>
                </select>
            </div>

            <div class="loading" id="loading" style="display: none;">Loading...</div>
            <div class="error" id="error" style="display: none;"></div>

            <div class="weather-display" id="weatherDisplay" style="display: none;">
                <div class="weather-main">
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="weather-icon">
                        <img id="iconImg" src="" alt="Weather icon">
                    </div>
                    <div class="description" id="description">--</div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <span class="label">Feels Like:</span>
                        <span id="feelsLike">--°C</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Humidity:</span>
                        <span id="humidity">--%</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Wind Speed:</span>
                        <span id="windSpeed">-- m/s</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Pressure:</span>
                        <span id="pressure">-- hPa</span>
                    </div>
                </div>

                <div class="location-info">
                    <h2 id="cityName">--</h2>
                    <p id="country">--</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
